<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Juliet premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <div class="hero">
            <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Music Illustration">
        </div>

        <div class="content">
            <h1> JULIET Premium</h1>

            <p>
                Listen to millions of songs world wide anywhere you are 
                with JULIET premium subscription
            </p>

            <div class="plan-box">
                <div class="plan-info">
                    <div class="icon">🎵</div>

                    <div>
                        <h3>Monthly Plan</h3>
                        <span>$99:99/month</span>
                    </div>
                </div>

                <a href="#">Change</a>
            </div>

            <button id="paymentBtn">
                Proceed to Payment
            </button>

            <button class="cancel-btn">
                Cancel Order
            </button>
        </div>

    </div>
</div>

</body>
</html>
